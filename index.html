<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XP Music Player</title>
  <link rel="stylesheet" href="style.css" />
<base target="_blank">
</head>
<body>

  <div class="player-wrapper">

    <!-- Imagem de fundo -->
    <div class="bg-image"></div>

    <!-- ÁREA PRETA: Visualizador + Nome + URL -->
    <div class="area-preta">
      <div class="track-info">
        <div class="artist-name" id="artist-name">Aguardando música...</div>
        <div class="track-name" id="track-name">—</div>
      </div>

      <div class="visualizer-box">
        <canvas id="vis-canvas"></canvas>
        <div class="vis-placeholder" id="vis-placeholder">
          <span>▶ Cole um link do YouTube abaixo</span>
        </div>
      </div>

      <div class="url-bar">
        <input type="text" id="url-input" placeholder="Cole o link do YouTube..." />
        <button onclick="loadURL()">Load</button>
      </div>
    </div>

    <!-- ÁREA AZUL: Capa + Fila + Total Time -->
    <div class="area-azul">
      <div class="album-art" id="album-art">
        <span>♪</span>
      </div>
      <div class="album-title" id="album-title">—</div>
      <div class="queue-list" id="queue-list">
        <div class="queue-empty">A fila aparece aqui</div>
      </div>
      <div class="total-time">Total Time: <span id="total-time">—</span></div>
    </div>

    <!-- BARRA DE PROGRESSO -->
    <div class="progress-bar">
      <div class="progress-track" id="progress-track" onclick="seekTo(event)">
        <div class="progress-fill" id="progress-fill"></div>
        <div class="progress-handle" id="progress-handle"></div>
      </div>
      <div class="time-row">
        <span id="time-current">0:00</span>
        <span id="time-total">0:00</span>
      </div>
    </div>

    <!-- STATUS -->
    <div class="status-bar">
      <span>Battery : <span id="vis-mode">Randomization</span></span>
      <span>Artist : <span id="status-artist">—</span></span>
      <button class="shuffle" id="shuffle-badge" onclick="toggleShuffle()">Shuffle: OFF</button>
    </div>

    <!-- BOTÕES (imagens PNG) -->
    <button class="btn-img prev" onclick="prevTrack()" title="Anterior">
      <img src="imagens/VOLTAR.png" alt="Prev" />
    </button>

    <button class="btn-img play" onclick="togglePlay()" id="play-btn" title="Play/Pause">
      <img src="imagens/PLAY.png" alt="Play" id="play-img" />
      <span class="pause-icon" id="pause-icon">⏸</span>
    </button>

    <button class="btn-img stop" onclick="stopPlayer()" title="Stop">
      <img src="imagens/QUADRADO.png" alt="Stop" />
    </button>

    <button class="btn-img next" onclick="nextTrack()" title="Próxima">
      <img src="imagens/AVANÇAR.png" alt="Next" />
    </button>

    <button class="btn-img mute" onclick="toggleMute()" id="mute-btn" title="Mudo">
      <img src="imagens/VOLUME.png" alt="Mute" />
    </button>

    <!-- VOLUME SLIDER -->
    <div class="volume-box">
      <input type="range" id="vol-slider" min="0" max="100" value="80" oninput="setVolume(this.value)" />
    </div>

  </div>

  <!-- Player YouTube (invisível) -->
  <div id="yt-player-wrap"><div id="yt-player"></div></div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="player.js"></script>
</body>
</html>
